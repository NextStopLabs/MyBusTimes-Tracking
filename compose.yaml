services:
  web:
    build: .
    container_name: mybustimes-tracking
    command: >
      gunicorn mybustimes.wsgi:application
      --workers 2
      --bind 0.0.0.0:8000
      --log-level info
    env_file: mybustimes/.env
    restart: always
    depends_on:
      - db
    ports:
      - "8000:8000"

  db:
    image: 'postgres:16'
    container_name: postgres-db-mbt
    restart: unless-stopped
    environment:
      POSTGRES_DB: mybustimes
      POSTGRES_USER: mybustimesDBuser
      POSTGRES_PASSWORD: CHANGE-ME-DO-NOT-KEEP-THIS
    volumes:
      - 'postgres-data:/var/lib/postgresql/data'

volumes:
  postgres-data:
